<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1e293b;
      margin: 0;
    }
    h1 { font-size: 15px; margin: 0 0 12px; }
    p { margin: 0 0 12px; color: #64748b; line-height: 1.5; }
    .status { padding: 8px 10px; border-radius: 6px; background: #f1f5f9; margin-bottom: 12px; }
    .status.stuck { background: #fef3c7; color: #92400e; }
    .status.working { background: #dcfce7; color: #166534; }
    button {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #1e293b;
      border-radius: 6px;
      font-family: inherit;
    }
    button:hover { background: #f1f5f9; }
    button.primary { background: #6366f1; color: #ffffff; border-color: #6366f1; }
    button.primary:hover { background: #4f46e5; }
    a { color: #6366f1; text-decoration: none; font-size: 12px; }
    .footer { margin-top: 12px; text-align: center; }
    .sites { margin: 0 0 12px; color: #94a3b8; font-size: 11px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>🛡️ RemoteProof</h1>
  <div id="status" class="status">Checking…</div>
  <button id="reload" class="primary">Reload page</button>
  <p class="sites">Works on: Indeed, We Work Remotely, RemoteOK, Greenhouse, Lever, Ashby.</p>
  <div class="footer">
    <a href="https://remoteproof.app" target="_blank">remoteproof.app</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
